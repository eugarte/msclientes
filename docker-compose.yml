version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: msclientes
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=msclientes
      - DB_PASSWORD=${DB_PASSWORD:-msclientes123}
      - DB_DATABASE=msclientes
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ISSUER=msseguridad
      - JWT_AUDIENCE=msclientes
      - JWT_EXPIRATION=24h
      - UPLOAD_DIR=/app/uploads
      - LOG_LEVEL=info
      - MSSEGURIDAD_URL=${MSSEGURIDAD_URL:-http://msseguridad:3001}
      - MSSEGURIDAD_API_KEY=${MSSEGURIDAD_API_KEY:-internal-api-key}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GDPR_DATA_RETENTION_DAYS=2555
      - GDPR_ANONYMIZATION_ENABLED=true
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - msclientes-network
      - shared-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    container_name: msclientes-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword123}
      - MYSQL_DATABASE=msclientes
      - MYSQL_USER=msclientes
      - MYSQL_PASSWORD=${DB_PASSWORD:-msclientes123}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - msclientes-network

  redis:
    image: redis:7-alpine
    container_name: msclientes-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - msclientes-network

volumes:
  mysql-data:
  redis-data:

networks:
  msclientes-network:
    driver: bridge
  shared-network:
    external: true
